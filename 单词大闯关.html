<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#6c5ce7;--primary-light:#a29bfe;--accent:#fdcb6e;--success:#00b894;--danger:#e17055;--bg:#f8f9fa;--card:#fff;--text:#2d3436;--text2:#636e72;--radius:12px;--shadow:0 4px 15px rgba(0,0,0,.1)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);max-width:440px;margin:0 auto;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.page{display:none;min-height:100vh;padding:20px;animation:fadeIn .3s}
.page.active{display:flex;flex-direction:column}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;width:100%}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#5b4cdb}
.btn-success{background:var(--success);color:#fff}
.btn-accent{background:var(--accent);color:#2d3436}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
.btn-sm{padding:10px 16px;font-size:14px}
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}

/* Home */
.home-title{font-size:36px;font-weight:800;text-align:center;margin-top:60px;background:linear-gradient(135deg,var(--primary),#e17055);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-sub{color:var(--text2);text-align:center;margin:8px 0 40px;font-size:14px}
.grade-btn{padding:20px;font-size:20px;font-weight:700;border-radius:16px;margin-bottom:16px;position:relative;overflow:hidden}
.grade-btn::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:0 0 0 60px;opacity:.15}

/* Level Select */
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--card);box-shadow:var(--shadow);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.page-title{font-size:20px;font-weight:700}
.book-label{font-size:14px;color:var(--primary);font-weight:600;margin:12px 0 8px}
.level-card{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s}
.level-card:active{transform:scale(.98)}
.level-card.locked{opacity:.5;pointer-events:none}
.level-card.completed{border-left:4px solid var(--success)}
.level-num{width:36px;height:36px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.level-card.completed .level-num{background:var(--success)}
.level-info{flex:1;min-width:0}
.level-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.level-sub{font-size:12px;color:var(--text2)}
.level-stars{color:var(--accent);font-size:14px;letter-spacing:2px}
.level-lock{font-size:20px}

/* Learn */
.learn-progress{height:6px;background:#e0e0e0;border-radius:3px;margin-bottom:20px;overflow:hidden}
.learn-progress-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:3px;transition:width .3s}
.learn-counter{text-align:center;font-size:13px;color:var(--text2);margin-bottom:8px}
.learn-word{text-align:center;padding:20px 0}
.learn-en{font-size:32px;font-weight:800;color:var(--primary)}
.learn-phonetic{font-size:18px;color:var(--text2);margin:4px 0}
.learn-cn{font-size:20px;color:var(--text);margin:8px 0}
.learn-speaker{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;border:2px solid var(--primary);background:transparent;cursor:pointer;font-size:24px;margin:8px 0;transition:all .2s}
.learn-speaker:active{background:var(--primary);color:#fff}
.learn-example{background:#f0edff;border-radius:var(--radius);padding:12px 16px;margin:16px 0;text-align:left;font-size:14px;line-height:1.6}
.learn-example b{color:var(--primary)}
.learn-btns{display:flex;gap:12px;margin-top:auto;padding-top:20px}
.learn-btns .btn{flex:1}

/* PK */
.pk-page{background:linear-gradient(135deg,#2d1b69,#1a1a2e);color:#fff;min-height:100vh;padding:20px}
.pk-header{text-align:center;margin-bottom:16px}
.pk-vs{font-size:28px;font-weight:800;text-align:center;margin:12px 0;background:linear-gradient(90deg,var(--accent),#e17055);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pk-scores{display:flex;justify-content:space-around;margin-bottom:16px}
.pk-score{text-align:center}
.pk-score-name{font-size:12px;opacity:.7}
.pk-score-val{font-size:28px;font-weight:800}
.pk-timer{width:80px;height:80px;border-radius:50%;border:4px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;margin:0 auto 20px;position:relative}
.pk-timer.urgent{border-color:var(--danger);color:var(--danger);animation:pulse .5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.pk-question{text-align:center;font-size:22px;font-weight:700;margin-bottom:20px;min-height:60px;display:flex;align-items:center;justify-content:center}
.pk-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.pk-opt{padding:14px;border:2px solid rgba(255,255,255,.2);border-radius:var(--radius);text-align:center;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.05)}
.pk-opt:active{transform:scale(.95)}
.pk-opt.correct{border-color:var(--success);background:rgba(0,184,148,.2);color:var(--success)}
.pk-opt.wrong{border-color:var(--danger);background:rgba(225,112,85,.2);color:var(--danger)}
.pk-opt.disabled{pointer-events:none}
.pk-result{text-align:center;padding:30px 0}
.pk-result-icon{font-size:64px;margin-bottom:12px}
.pk-result-text{font-size:24px;font-weight:800;margin-bottom:8px}
.pk-result-detail{font-size:14px;opacity:.7}

/* Report */
.report-card{background:linear-gradient(135deg,#6c5ce7,#a29bfe);border-radius:20px;padding:24px;color:#fff;text-align:center;margin:20px 0;position:relative;overflow:hidden}
.report-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.1)}
.report-title{font-size:22px;font-weight:800;margin-bottom:16px}
.report-score{font-size:48px;font-weight:900;margin:8px 0}
.report-stars{font-size:28px;letter-spacing:4px;margin:8px 0}
.report-info{font-size:13px;opacity:.8;margin:4px 0}
.report-lock{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.2);border-radius:20px;padding:4px 12px;font-size:12px;margin-top:12px}
.report-actions{display:flex;gap:12px;margin-top:20px}

/* History */
.history-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #eee}
.history-item:last-child{border:none}
.history-name{font-size:14px;font-weight:600}
.history-score{font-size:14px;color:var(--primary);font-weight:700}
.history-date{font-size:12px;color:var(--text2)}
.history-stars{color:var(--accent)}

/* Responsive helpers */
.text-center{text-align:center}
.mt-auto{margin-top:auto}
.mb-8{margin-bottom:8px}
.mb-16{margin-bottom:16px}
.mb-20{margin-bottom:20px}
.gap-12{gap:12px}

/* Animations */
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.bounce-in{animation:bounceIn .4s}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .4s}
</style>
</head>

  pkAnswered: false,
  pkOptions: []
};

// ========== STORAGE ==========
function getProgress() {
  try { return JSON.parse(localStorage.getItem('wordpk_progress') || '{}'); } catch { return {}; }
}
function saveProgress(p) { localStorage.setItem('wordpk_progress', JSON.stringify(p)); }
function getHistory() {
  try { return JSON.parse(localStorage.getItem('wordpk_history') || '[]'); } catch { return []; }
}
function saveHistory(h) { localStorage.setItem('wordpk_history', JSON.stringify(h)); }

function isUnlocked(grade, idx) {
  if (idx === 0) return true;
  const p = getProgress();
  const prevKey = grade + '_' + (idx - 1);
  return p[prevKey] && p[prevKey].stars > 0;
}
function getLevelProgress(grade, idx) {
  const p = getProgress();
  return p[grade + '_' + idx] || null;
}

// ========== AUDIO ==========
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, dur, type) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxCorrect() { playTone(523, 0.12, 'sine'); setTimeout(() => playTone(659, 0.12, 'sine'), 100); setTimeout(() => playTone(784, 0.2, 'sine'), 200); }
function sfxWrong() { playTone(200, 0.3, 'sawtooth'); }
function sfxWin() { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.15, 'sine'), i * 120)); }
function sfxClick() { playTone(800, 0.05, 'sine'); }

// ========== SPEECH ==========
function speak(word, cb) {
  if (!window.speechSynthesis) { cb && cb(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US'; u.rate = 0.8;
  if (cb) u.onend = cb;
  window.speechSynthesis.speak(u);
}

// ========== NAVIGATION ==========
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ========== HOME ==========
function selectGrade(g) {
  sfxClick();
  state.grade = g;
  renderLevels();
  showPage('page-levels');
}

// ========== LEVELS ==========
function renderLevels() {
  const levels = DATA[state.grade];
  const el = document.getElementById('page-levels');
  let html = `<div class="header"><button class="back-btn" onclick="goHome()">&#8592;</button><div class="page-title">${state.grade}年级 闯关选择</div></div>`;
  let lastBook = '';
  levels.forEach((lv, i) => {
    if (lv.book !== lastBook) {
      lastBook = lv.book;
      html += `<div class="book-label">${lv.book}</div>`;
    }
    const unlocked = isUnlocked(state.grade, i);
    const prog = getLevelProgress(state.grade, i);
    const stars = prog ? prog.stars : 0;
    const starStr = stars > 0 ? '★'.repeat(stars) + '☆'.repeat(3 - stars) : '';
    html += `<div class="level-card ${unlocked ? (stars > 0 ? 'completed' : '') : 'locked'}" onclick="startLearn(${i})">
      <div class="level-num">${i + 1}</div>
      <div class="level-info"><div class="level-name">${lv.unit}</div><div class="level-sub">${lv.words.length}个核心词</div></div>
      ${unlocked ? (stars > 0 ? `<div class="level-stars">${starStr}</div>` : '<div style="color:var(--primary);font-size:12px;font-weight:600">GO</div>') : '<div class="level-lock">🔒</div>'}
    </div>`;
  });
  html += `<div style="margin-top:20px"><button class="btn btn-outline btn-sm" onclick="showHistory()">历史成绩</button></div>`;
  el.innerHTML = html;
}

function goHome() { sfxClick(); showPage('page-home'); }

// ========== LEARN ==========
function startLearn(levelIdx) {
  sfxClick();
  state.levelIdx = levelIdx;
  state.learnIdx = 0;
  renderLearn();
  showPage('page-learn');
  setTimeout(() => speakCurrentWord(), 300);
}

function renderLearn() {
  const lv = DATA[state.grade][state.levelIdx];
  const w = lv.words[state.learnIdx];
  const total = lv.words.length;
  const pct = ((state.learnIdx) / total * 100).toFixed(0);
  const el = document.getElementById('page-learn');
  el.innerHTML = `
    <div class="header">
      <button class="back-btn" onclick="backToLevels()">&#8592;</button>
      <div class="page-title">${lv.unit}</div>
    </div>
    <div class="learn-counter">${state.learnIdx + 1} / ${total}</div>
    <div class="learn-progress"><div class="learn-progress-bar" style="width:${pct}%"></div></div>
    <div class="learn-word slide-up">
      <div class="learn-en">${w.en}</div>
      <div class="learn-phonetic">${w.ph}</div>
      <div class="learn-cn">${w.cn}</div>
      <button class="learn-speaker" onclick="speakCurrentWord()">&#128266;</button>
    </div>
    <div class="learn-example">${w.ex}</div>
    <div class="learn-btns">
      <button class="btn btn-success" onclick="nextWord()">我会了 ✓</button>
    </div>`;
}

function speakCurrentWord() {
  const lv = DATA[state.grade][state.levelIdx];
  speak(lv.words[state.learnIdx].en);
}

function nextWord() {
  sfxClick();
  state.learnIdx++;
  const lv = DATA[state.grade][state.levelIdx];
  if (state.learnIdx >= lv.words.length) {
    startPK();
  } else {
    renderLearn();
    speakCurrentWord();
  }
}

function backToLevels() {
  sfxClick();
  renderLevels();
  showPage('page-levels');
}

// ========== PK ==========
function startPK() {
  const lv = DATA[state.grade][state.levelIdx];
  state.pkWords = [...lv.words].sort(() => Math.random() - 0.5);
  state.pkIdx = 0;
  state.pkScore = 0;
  state.aiScore = 0;
  state.pkAnswered = false;
  renderPK();
  showPage('page-pk');
  setTimeout(() => speakPKQuestion(), 500);
}

function renderPK() {
  const el = document.getElementById('page-pk');
  el.className = 'page active pk-page';
  const w = state.pkWords[state.pkIdx];
  // Generate options: correct + 3 wrong
  const allWords = DATA[state.grade].flatMap(u => u.words);
  const wrongs = allWords.filter(x => x.cn !== w.cn).sort(() => Math.random() - 0.5).slice(0, 3);
  const options = [w, ...wrongs].sort(() => Math.random() - 0.5);
  state.pkOptions = options;
  state.pkTimeLeft = 10;
  state.pkAnswered = false;

  el.innerHTML = `
    <div class="pk-header">
      <div class="pk-vs">VS</div>
      <div style="font-size:12px;opacity:.6">第 ${state.pkIdx + 1} / ${state.pkWords.length} 题</div>
    </div>
    <div class="pk-scores">
      <div class="pk-score"><div class="pk-score-name">我</div><div class="pk-score-val" id="my-score">${state.pkScore}</div></div>
      <div class="pk-score"><div class="pk-score-name">AI</div><div class="pk-score-val" id="ai-score">${state.aiScore}</div></div>
    </div>
    <div class="pk-timer" id="pk-timer">${state.pkTimeLeft}</div>
    <div class="pk-question" id="pk-question">${w.cn}</div>
    <div class="pk-options" id="pk-options">
      ${options.map((o, i) => `<div class="pk-opt" id="opt-${i}" onclick="pkAnswer(${i})">${o.en}</div>`).join('')}
    </div>`;
  startPKTimer();
}

function startPKTimer() {
  clearInterval(state.pkTimer);
  state.pkTimer = setInterval(() => {
    state.pkTimeLeft--;
    const timerEl = document.getElementById('pk-timer');
    if (timerEl) {
      timerEl.textContent = state.pkTimeLeft;
      if (state.pkTimeLeft <= 3) timerEl.classList.add('urgent');
    }
    if (state.pkTimeLeft <= 0) {
      clearInterval(state.pkTimer);
      if (!state.pkAnswered) pkTimeout();
    }
  }, 1000);
}

function speakPKQuestion() {
  const w = state.pkWords[state.pkIdx];
  speak(w.en);
}

function pkAnswer(idx) {
  if (state.pkAnswered) return;
  state.pkAnswered = true;
  clearInterval(state.pkTimer);
  const chosen = state.pkOptions[idx];
  const correct = state.pkWords[state.pkIdx];
  const optEl = document.getElementById('opt-' + idx);

  if (chosen.en === correct.en) {
    optEl.classList.add('correct');
    state.pkScore++;
    sfxCorrect();
    document.getElementById('my-score').textContent = state.pkScore;
    // Read the correct answer again
    setTimeout(() => speak(correct.en), 300);
  } else {
    optEl.classList.add('wrong');
    sfxWrong();
    // Show correct answer
    state.pkOptions.forEach((o, i) => {
      if (o.en === correct.en) document.getElementById('opt-' + i).classList.add('correct');
    });
    // AI gets the point
    state.aiScore++;
    document.getElementById('ai-score').textContent = state.aiScore;
  }
  // Disable all options
  document.querySelectorAll('.pk-opt').forEach(o => o.classList.add('disabled'));

  setTimeout(() => pkNext(), 1800);
}

function pkTimeout() {
  state.pkAnswered = true;
  const correct = state.pkWords[state.pkIdx];
  state.aiScore++;
  sfxWrong();
  const scoreEl = document.getElementById('ai-score');
  if (scoreEl) scoreEl.textContent = state.aiScore;
  state.pkOptions.forEach((o, i) => {
    if (o.en === correct.en) document.getElementById('opt-' + i).classList.add('correct');
    document.getElementById('opt-' + i).classList.add('disabled');
  });
  setTimeout(() => pkNext(), 1500);
}

function pkNext() {
  state.pkIdx++;
  if (state.pkIdx >= state.pkWords.length) {
    pkFinish();
  } else {
    renderPK();
    setTimeout(() => speakPKQuestion(), 400);
  }
}

function pkFinish() {
  clearInterval(state.pkTimer);
  const total = state.pkWords.length;
  const score = state.pkScore;
  const pct = score / total;
  let stars = pct >= 1 ? 3 : pct >= 0.7 ? 2 : pct >= 0.4 ? 1 : 0;
  const won = score > state.aiScore;
  if (won) sfxWin();

  // Save progress
  const p = getProgress();
  const key = state.grade + '_' + state.levelIdx;
  if (!p[key] || p[key].stars < stars) {
    p[key] = { stars, score, total };
    saveProgress(p);
  }

  // Save history
  const lv = DATA[state.grade][state.levelIdx];
  const h = getHistory();
  h.unshift({
    grade: state.grade,
    unit: lv.unit,
    book: lv.book,
    score, total, stars, won,
    date: new Date().toLocaleDateString('zh-CN')
  });
  if (h.length > 50) h.length = 50;
  saveHistory(h);

  renderReport(score, total, stars, won);
  showPage('page-report');
}

// ========== REPORT ==========
function renderReport(score, total, stars, won) {
  const lv = DATA[state.grade][state.levelIdx];
  const starStr = '★'.repeat(stars) + '☆'.repeat(3 - stars);
  const el = document.getElementById('page-report');
  el.innerHTML = `
    <div class="header">
      <div class="page-title">闯关成绩单</div>
    </div>
    <div class="report-card">
      <div class="report-title">${won ? '恭喜胜利!' : '再接再厉!'}</div>
      <div class="report-score">${score} / ${total}</div>
      <div class="report-stars">${starStr}</div>
      <div class="report-info">${lv.book}</div>
      <div class="report-info">${lv.unit}</div>
      <div class="report-info">${new Date().toLocaleDateString('zh-CN')} ${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</div>
      <div class="report-lock">🔒 成绩已锁定</div>
    </div>
    <div class="report-actions">
      <button class="btn btn-primary" onclick="replayLevel()">再闯一次</button>
      <button class="btn btn-accent" onclick="backToLevelsFromReport()">返回关卡</button>
    </div>`;
}

function replayLevel() {
  sfxClick();
  startLearn(state.levelIdx);
}

function backToLevelsFromReport() {
  sfxClick();
  renderLevels();
  showPage('page-levels');
}

// ========== HISTORY ==========
function showHistory() {
  sfxClick();
  const h = getHistory();
  const el = document.getElementById('page-history');
  let html = `<div class="header">
    <button class="back-btn" onclick="renderLevels();showPage('page-levels')">&#8592;</button>
    <div class="page-title">历史成绩</div>
  </div>`;
  if (h.length === 0) {
    html += '<div style="text-align:center;color:var(--text2);margin-top:40px">还没有闯关记录</div>';
  } else {
    h.forEach(item => {
      const starStr = '★'.repeat(item.stars) + '☆'.repeat(3 - item.stars);
      html += `<div class="history-item">
        <div><div class="history-name">${item.unit}</div><div class="history-date">${item.book} · ${item.date}</div></div>
        <div style="text-align:right"><div class="history-score">${item.score}/${item.total}</div><div class="history-stars">${starStr}</div></div>
      </div>`;
    });
  }
  el.innerHTML = html;
  showPage('page-history');
}

// ========== INIT ==========
// Ensure audio context resumes on user interaction
document.addEventListener('click', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });
</script>
